startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      clientId:
        type: string
        description: "Your Signal Found client ID. Leave blank if you don't have one yet — run create_new_account to get started."
  commandFunction: |-
    (config) => ({
      command: "uvx",
      args: ["sf-mcp"],
      env: {
        ...(config.clientId ? { ONBOARD_API_CLIENT_ID: config.clientId } : {}),
        MCP_TRANSPORT: "stdio"
      }
    })
